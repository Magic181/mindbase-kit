services:
  frontend:
    build:
      context: ./frontend
    container_name: mindbase-kit-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - backend_media:/usr/share/nginx/media:ro
      - backend_static:/usr/share/nginx/static:ro
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
    container_name: mindbase-kit-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}"
      DJANGO_CORS_ALLOWED_ORIGINS: "${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      USE_SQLITE: "false"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: "${DOCKER_MYSQL_DATABASE:-ai_notebook}"
      MYSQL_USER: "${DOCKER_MYSQL_USER:-ai_notebook}"
      MYSQL_PASSWORD: "${DOCKER_MYSQL_PASSWORD:-dev-password}"
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: mindbase-kit-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}"
      USE_SQLITE: "false"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: "${DOCKER_MYSQL_DATABASE:-ai_notebook}"
      MYSQL_USER: "${DOCKER_MYSQL_USER:-ai_notebook}"
      MYSQL_PASSWORD: "${DOCKER_MYSQL_PASSWORD:-dev-password}"
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      SKIP_COLLECTSTATIC: "true"
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    volumes:
      - backend_media:/app/media
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: mindbase-kit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DOCKER_MYSQL_ROOT_PASSWORD:-root-password}"
      MYSQL_DATABASE: "${DOCKER_MYSQL_DATABASE:-ai_notebook}"
      MYSQL_USER: "${DOCKER_MYSQL_USER:-ai_notebook}"
      MYSQL_PASSWORD: "${DOCKER_MYSQL_PASSWORD:-dev-password}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mindbase-kit-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  backend_media:
  backend_static:
  mysql_data:
  redis_data:
